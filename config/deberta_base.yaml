# DeBERTa-Base configuration (approx. 132M parameters).
# Adds disentangled self-attention with a relative-position window over the
# BERT-Base backbone.

# --- Architecture ---
model: deberta                 # bert | deberta
hidden: 768
layers: 12
attn_heads: 12
dropout: 0.1
max_relative_positions: 512    # DeBERTa-only: clip range for relative pos

# --- Context window ---
seq_len: 512

# --- Training defaults ---
batch_size: 32
gradient_accumulation_steps: 8   # effective batch = 32 * 8 = 256 (paper)
epochs: 40
lr: 1.0e-4
warmup_steps: 10000
weight_decay: 0.01
grad_clip: 1.0
beta1: 0.9
beta2: 0.999
fp16: true
num_workers: 8
log_freq: 10
